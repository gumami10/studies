<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISTQB CTAL-AT — Starred Sections</title>
<link rel="stylesheet" href="study-common.css">
</head>
<body data-no-auto-init>
<div class="container">
  <header>
    <h1>Starred Sections</h1>
    <p class="subtitle">Your saved study highlights from all chapters</p>
  </header>

  <main id="starred-content"></main>

  <footer>
    Generated from ISTQB® CTAL-AT Syllabus v2.0 — Starred Review
  </footer>
</div>

<script src="study-common.js"></script>
<script>
(function() {
  'use strict';
  var container = document.getElementById('starred-content');
  var starred = window.StarStudy.getStarred();

  var ids = Object.keys(starred);
  if (ids.length === 0) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<h3>No starred sections yet</h3>' +
        '<p>Click the star icon next to any section while studying to save it here.</p>' +
      '</div>';
  } else {
    var bySource = {};
    ids.forEach(function(id) {
      var item = starred[id];
      var src = item.source || 'Unknown';
      if (!bySource[src]) bySource[src] = [];
      bySource[src].push(item);
    });

    Object.keys(bySource).forEach(function(source) {
      var group = document.createElement('div');
      group.className = 'source-group';

      var badge = document.createElement('div');
      badge.className = 'source-badge';
      badge.textContent = 'From: ' + source;
      group.appendChild(badge);

      bySource[source].forEach(function(item) {
        var sanitized = window.StarStudy.sanitizeHtml(item.html || '');
        var wrapper = document.createElement('div');
        wrapper.innerHTML = sanitized;
        var section = wrapper.querySelector('section') || wrapper.firstElementChild;
        if (section) {
          if (!section.id) section.id = item.id;
          group.appendChild(section);
        }
      });

      container.appendChild(group);
    });
  }

  window.StarStudy.initNav();
  window.StarStudy.initStarButtons();
})();
</script>
</body>
</html>
